<!DOCTYPE html>
<html>
<head>
  <title>Testnet Faucet</title>
  <script src="https://cdn.jsdelivr.net/npm/ethers@6.6.2/dist/ethers.umd.min.js"></script>
</head>
<body>

<h2>🚰 Testnet Faucet</h2>

<button onclick="connectWallet()">Connect Wallet</button>
<p id="wallet"></p>

<p>Contract Balance: <span id="balance">-</span></p>
<p>Cooldown Remaining: <span id="cooldown">-</span></p>

<button onclick="claim()">Claim ETH</button>

<script>

const contractAddress = "PASTE_YOUR_CONTRACT_ADDRESS";
const abi = PASTE_YOUR_ABI_HERE;

let provider;
let signer;
let contract;
let userAddress;

async function connectWallet() {
  if (!window.ethereum) {
    alert("Install MetaMask");
    return;
  }

  provider = new ethers.BrowserProvider(window.ethereum);
  await provider.send("eth_requestAccounts", []);
  signer = await provider.getSigner();
  userAddress = await signer.getAddress();

  contract = new ethers.Contract(contractAddress, abi, signer);

  document.getElementById("wallet").innerText = "Connected: " + userAddress;

  updateUI();
}

async function updateUI() {
  const balance = await provider.getBalance(contractAddress);
  document.getElementById("balance").innerText =
    ethers.formatEther(balance) + " ETH";

  const lastClaimed = await contract.lastClaimed(userAddress);
  const cooldown = await contract.cooldownTime();

  const now = Math.floor(Date.now() / 1000);
  const remaining = Number(lastClaimed) + Number(cooldown) - now;

  document.getElementById("cooldown").innerText =
    remaining > 0 ? remaining + " seconds" : "Ready";
}

async function claim() {
  try {
    const tx = await contract.claim();
    await tx.wait();
    alert("Claim successful!");
    updateUI();
  } catch (err) {
    alert(err.reason || "Transaction failed");
  }
}

</script>

</body>
</html>
